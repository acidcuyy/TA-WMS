<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReaStock WMS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 72px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #f8fafc; }
    p { font-size: 15px; color: #94a3b8; line-height: 1.6; max-width: 320px; }
    .badge {
      margin-top: 32px;
      display: inline-block;
      padding: 8px 20px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 100px;
      font-size: 13px;
      color: #64748b;
    }
    button {
      margin-top: 24px;
      padding: 12px 28px;
      background: #f86c14;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Tidak Ada Koneksi</h1>
  <p>
    Anda sedang offline. Pastikan koneksi internet Anda aktif,
    lalu coba lagi.
  </p>
  <button onclick="window.location.reload()">🔄 Coba Lagi</button>
  <span class="badge">ReaStock WMS</span>
</body>
</html>
