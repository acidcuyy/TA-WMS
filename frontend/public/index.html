<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport & Theme ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f86c14" />
    <meta name="description" content="ReaStock — Aplikasi Sistem Informasi Gudang dengan fitur tracking barang real-time berbasis Progressive Web App" />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Favicon & Icons ── -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo192.png" />

    <!-- ── iOS PWA Meta Tags ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReaStock" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS Splash Screens (portrait) ── -->
    <!-- iPhone SE / 5s -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="%PUBLIC_URL%/logo512.png" />
    <!-- iPhone 8 / 7 / 6 -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="%PUBLIC_URL%/logo512.png" />
    <!-- iPhone X / XS / 11 Pro -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="%PUBLIC_URL%/logo512.png" />
    <!-- iPhone XR / 11 -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="%PUBLIC_URL%/logo512.png" />

    <!-- ── SEO ── -->
    <meta property="og:title" content="ReaStock — Sistem Informasi Gudang" />
    <meta property="og:description" content="Aplikasi WMS dengan fitur tracking barang real-time" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:type" content="website" />

    <title>ReaStock — Sistem Informasi Gudang</title>
  </head>
  <body>
    <noscript>Anda perlu mengaktifkan JavaScript untuk menjalankan aplikasi ini.</noscript>
    <div id="root"></div>
  </body>
</html>
